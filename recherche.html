<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Recherche — SENORIF interactif</title><link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%233f6aa8'/%3E%3Ctext x='32' y='45' font-family='Arial,Helvetica,sans-serif' font-size='34' font-weight='900' fill='white' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E"><meta name="description" content="Recherche dans SENORIF interactif."><style>:root {
  --bg:#ffffff;
  --card:#c5d8e8;
  --text:#233044;
  --muted:#617086;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrapper{max-width:1180px;margin:0 auto;padding:34px 22px 70px}
header{text-align:center;margin-bottom:30px}
.header-top{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:20px}
.header-title{flex:1 1 auto;min-width:260px}
.header-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
h1{color:#3f6aa8;font-size:clamp(34px,5vw,58px);font-weight:900}
.subtitle{color:#617086;font-size:17px;margin-top:8px}
.pdf-button{display:inline-flex;align-items:center;gap:8px;background:#3f6aa8;color:white;font-weight:800;font-size:14px;padding:12px 18px;border-radius:999px;text-decoration:none;white-space:nowrap;box-shadow:0 3px 10px rgba(31,50,90,.16)}
.pdf-button:hover{background:#335686}
.specialty-button{background:#48A68D}
.specialty-button:hover{background:#3a8873}
@media(max-width:640px){.header-top{flex-direction:column}}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
.theme-zones{display:flex;flex-direction:column;gap:22px}
.theme-zone{background:var(--zone-bg,#f4f5f7);border-radius:22px;padding:20px 20px 24px}
.theme-title{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:#33456a;margin:0 0 14px 4px}
@media(max-width:640px){.theme-zone{padding:16px 14px 20px;border-radius:18px}}

.chapter summary{
  list-style:none;
  position:relative;
  width:100%;
  min-height:126px;
  border:0;
  border-radius:0 18px 18px 0;
  background:var(--card);
  color:#33456a;
  font-size:22px;
  font-weight:800;
  line-height:1.15;
  padding:18px 18px 34px 28px;
  cursor:pointer;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 3px 10px rgba(31,50,90,.06);
  overflow:hidden;
}
.chapter summary::-webkit-details-marker{display:none}
.chapter summary::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:24px;
  background:var(--accent);
}
.chapter[open] summary{
  background:color-mix(in srgb, var(--accent) 78%, white);
  color:white;
}
.chapter[open] summary::before{background:var(--accent)}

.summary-title{display:block}
.update-date{
  position:absolute;
  right:12px;
  bottom:9px;
  font-size:11px;
  font-weight:700;
  color:#4a5670;
  white-space:nowrap;
}
.chapter[open] .update-date{color:rgba(255,255,255,.82)}

.panel{
  background:color-mix(in srgb, var(--accent) 84%, #233044);
  color:white;
  border-radius:0 0 18px 18px;
  padding:28px 26px 32px;
  margin-top:10px;
  box-shadow:0 10px 24px rgba(31,50,90,.13);
}
.arrow{width:46px;height:34px;margin:0 0 18px 12px;position:relative}
.arrow::before,.arrow::after{content:"";position:absolute;width:34px;height:7px;background:#e5efff;border-radius:999px;top:14px}
.arrow::before{transform:rotate(-45deg);left:0}
.arrow::after{transform:rotate(45deg);left:21px}
.panel h2{font-size:26px;margin-bottom:18px;color:#eef5ff}
.panel ul{list-style:none}
.panel li{margin:8px 0}
.subchapter-btn{width:100%;border:0;background:transparent;color:#eef5ff;display:flex;gap:12px;align-items:flex-start;text-align:left;font-size:17px;font-weight:800;cursor:pointer;padding:4px 0;text-decoration:none}
.subchapter-btn:hover span:last-child{text-decoration:underline}
.chev{font-size:23px;line-height:1;color:#d9e8ff;font-weight:300}

@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.chapter summary{font-size:20px;min-height:112px}}
@media(max-width:560px){.grid{grid-template-columns:1fr}.chapter summary{min-height:92px}.panel h2{font-size:24px}.subchapter-btn{font-size:16px}}
.search-wrap{max-width:760px;margin:22px auto 28px;position:relative}
.search-box-row{display:flex;gap:8px;align-items:stretch}
.search-box{width:100%;border:1px solid rgba(85,112,174,.28);border-radius:999px;padding:14px 18px;font-size:16px;color:var(--text);outline:none;box-shadow:0 3px 12px rgba(31,50,90,.06)}
.search-box:focus{border-color:#5570AE;box-shadow:0 0 0 4px rgba(85,112,174,.13)}
.search-go-btn{flex:0 0 auto;width:52px;border:0;border-radius:50%;background:#3f6aa8;color:white;font-size:19px;cursor:pointer;box-shadow:0 3px 10px rgba(31,50,90,.16)}
.search-go-btn:hover{background:#335686}
.search-filters{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.search-filter{border:1px solid rgba(85,112,174,.28);background:white;color:#3f6aa8;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer}
.search-filter:hover{background:#eef3fb}
.search-filter.active{background:#3f6aa8;color:white;border-color:#3f6aa8}
.search-results{display:none;position:absolute;z-index:20;left:0;right:0;top:96px;background:white;border:1px solid #e5e7eb;border-radius:16px;box-shadow:0 12px 30px rgba(31,50,90,.16);padding:10px;max-height:420px;overflow:auto;text-align:left}
.search-results.open{display:block}
.search-result{display:block;padding:12px 14px;border-radius:12px;color:var(--text);text-decoration:none}
.search-result:hover{background:#f3f6fb}
.search-result-title{font-weight:900;color:#3f6aa8;margin-bottom:4px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.result-badge{font-size:11px;font-weight:800;color:#3f5a8a;background:#eef1fa;border-radius:999px;padding:2px 9px}
.search-result-path{font-size:12px;font-weight:700;color:#617086;margin-bottom:5px}
.search-result-snippet{font-size:13px;color:#455066;line-height:1.4}
.search-result-snippet mark{background:#fff3a3;padding:0 2px;border-radius:3px}
.search-empty{padding:12px 14px;color:#617086;font-size:14px}
.search-see-all{display:block;text-align:center;padding:12px 14px;margin-top:4px;border-top:1px solid #eef1f7;color:#3f6aa8;font-weight:800;font-size:14px;text-decoration:none}
.search-see-all:hover{text-decoration:underline}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.search-page-main{max-width:900px;margin:0 auto;padding:0 8px}
.search-page-summary{color:#617086;font-size:14px;margin:16px 0 20px;padding-left:4px}
.search-page-results{display:flex;flex-direction:column;gap:12px}
.search-page-result{display:block;background:white;border:1px solid var(--border, #e5e7eb);border-radius:16px;padding:18px 20px;text-decoration:none;color:inherit;box-shadow:0 3px 10px rgba(31,50,90,.05)}
.search-page-result:hover{border-color:#3f6aa8;box-shadow:0 6px 16px rgba(31,50,90,.1)}
.search-page-result .search-result-title{font-weight:900;color:#3f6aa8;margin-bottom:4px;font-size:17px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.search-page-result .search-result-path{font-size:12px;font-weight:700;color:#617086;margin-bottom:7px}
.search-page-result .search-result-snippet{font-size:14px;color:#455066;line-height:1.5}
.search-page-result .search-result-snippet mark{background:#fff3a3;padding:0 2px;border-radius:3px}
.back-home-link{display:inline-block;margin:0 0 18px;color:#3f6aa8;font-weight:800;text-decoration:none}
.back-home-link:hover{text-decoration:underline}</style></head><body><div class="wrapper"><header>
<div class="header-top">
<div class="header-title"><h1>SENORIF interactif</h1><p class="subtitle"><a href="index.html" class="back-home-link">← Retour à l'accueil</a></p></div>
</div>
</header>
<div class="search-wrap">
<div class="search-box-row">
<input autocomplete="off" class="search-box" id="siteSearch" placeholder="Rechercher un ou plusieurs mots-clés…" type="search">
</div>
<div class="search-filters" id="searchFilters">
<button type="button" class="search-filter active" data-filter="all" aria-pressed="true">Tout</button>
<button type="button" class="search-filter" data-filter="image" aria-pressed="false">🖼️ Images</button>
<button type="button" class="search-filter" data-filter="table" aria-pressed="false">📊 Tableaux</button>
</div>
</div>
<main class="search-page-main">
<div class="search-page-summary" id="searchPageSummary"></div>
<div class="search-page-results" id="searchPageResults"></div>
</main>
</div>
<script>(function(){
  function norm(v){return String(v||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
  function escS(v){return String(v||"").replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]})}
  function tokenize(q){return norm(q).split(/\s+/).filter(Boolean)}
  const box=document.getElementById("siteSearch");
  const filterBar=document.getElementById("searchFilters");
  const summary=document.getElementById("searchPageSummary");
  const list=document.getElementById("searchPageResults");
  const params=new URLSearchParams(location.search);
  let activeFilter=params.get("f")||"all";
  function snippetAround(text, normText, tokens){
    let i=-1;
    tokens.forEach(function(t){ const p=normText.indexOf(t); if(p>=0 && (i<0||p<i)) i=p; });
    if(i<0) return "";
    const start=Math.max(0, i-70), end=Math.min(text.length, i+110);
    return (start>0?"… ":"") + text.slice(start,end).trim() + (end<text.length?" …":"");
  }
  function highlightSnippet(snipHtml, tokens){
    if(!tokens.length) return snipHtml;
    const re=new RegExp("("+tokens.map(function(t){return t.replace(/[.*+?^${}()|[]\]/g,"\$&")}).join("|")+")","gi");
    return snipHtml.replace(re,"<mark>$1</mark>");
  }
  function matchesFilter(x){
    if(activeFilter==="image") return !!x.img;
    if(activeFilter==="table") return !!x.tab;
    return true;
  }
  function badgesFor(x){
    let h="";
    if(x.img) h+='<span class="result-badge">🖼️ Image</span>';
    if(x.tab) h+='<span class="result-badge">📊 Tableau</span>';
    return h;
  }
  function scoreEntry(x,tokens){
    let score=0;
    const nt=x._normTitle, full=tokens.join(" ");
    if(nt===full) score+=1000;
    else if(nt.indexOf(full)===0) score+=500;
    else if(nt.includes(full)) score+=300;
    tokens.forEach(function(t){
      if(nt.includes(t)) score+=150;
      const idx=x._normText.indexOf(t);
      if(idx>=0){
        score+=Math.max(0,40-Math.floor(idx/20));
        let count=0,pos=0;
        while((pos=x._normText.indexOf(t,pos))!==-1){count++;pos+=t.length}
        score+=Math.min(count,10)*2;
      }
    });
    return score;
  }
  let index=[];
  fetch("search-index.json").then(r=>r.ok?r.json():[]).then(function(d){
    index=(Array.isArray(d)?d:[]).map(function(x){
      x._normText=norm(x.text);
      x._normTitle=norm(x.title);
      return x;
    });
    runSearch();
  }).catch(function(){index=[]});
  function runSearch(){
    const rawQ=box.value.trim();
    const tokens=tokenize(rawQ);
    if(!tokens.length){
      list.innerHTML="";
      summary.textContent="Tape un ou plusieurs mots-clés pour lancer la recherche.";
      return;
    }
    let found=index.filter(function(x){
      return tokens.every(function(t){return x._normText.includes(t)}) && matchesFilter(x);
    });
    found=found.map(function(x){return {x:x,s:scoreEntry(x,tokens)}}).sort(function(a,b){return b.s-a.s}).map(function(p){return p.x});
    summary.textContent = found.length
      ? found.length+" résultat"+(found.length>1?"s":"")+" pour « "+rawQ+" »"
      : "Aucun résultat pour « "+rawQ+" ».";
    list.innerHTML=found.map(function(x){
      const snip=snippetAround(x.text, x._normText, tokens);
      const hrefWithHl=x.href+(x.href.includes("?")?"&":"?")+"hl="+encodeURIComponent(rawQ);
      let snipHtml=highlightSnippet(escS(snip), tokens);
      return '<a class="search-page-result" href="'+escS(hrefWithHl)+'"><div class="search-result-title">'+escS(x.title)+badgesFor(x)+'</div><div class="search-result-path">'+escS(x.chapter)+'</div>'
        +(snip?'<div class="search-result-snippet">'+snipHtml+'</div>':'')+'</a>';
    }).join("");
  }
  box.addEventListener("input",runSearch);
  if(filterBar){
    Array.from(filterBar.querySelectorAll(".search-filter")).forEach(function(b){
      const isActive=b.getAttribute("data-filter")===activeFilter;
      b.classList.toggle("active",isActive);
      b.setAttribute("aria-pressed",isActive?"true":"false");
    });
    filterBar.addEventListener("click",function(e){
      const btn=e.target.closest(".search-filter");
      if(!btn)return;
      Array.from(filterBar.querySelectorAll(".search-filter")).forEach(function(b){
        b.classList.remove("active");
        b.setAttribute("aria-pressed","false");
      });
      btn.classList.add("active");
      btn.setAttribute("aria-pressed","true");
      activeFilter=btn.getAttribute("data-filter");
      runSearch();
    });
  }
  if(params.get("q")){ box.value=params.get("q"); }
})();</script>
</body></html>
