<script>
document.addEventListener("DOMContentLoaded",function(){
  document.querySelectorAll(".senorif-table[data-file]").forEach(function(holder){
    var file=holder.getAttribute("data-file");
    // Squelette affiché pendant le chargement du JSON, pour éviter que la
    // page "saute" quand le tableau apparaît d'un coup.
    holder.classList.add("table-loading");
    holder.innerHTML='<div class="table-skel-row"></div><div class="table-skel-row"></div><div class="table-skel-row"></div>';
    fetch(file+"?v="+Date.now())
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(function(data){
        var table=document.createElement("table");
        var tbody=document.createElement("tbody");

        if(data.colonnes && data.colonnes.length){
          var tr=document.createElement("tr");
          data.colonnes.forEach(function(c){
            var th=document.createElement("th");
            th.textContent=c;
            tr.appendChild(th);
          });
          tbody.appendChild(tr);
        }

        (data.lignes||[]).forEach(function(row){
          var tr=document.createElement("tr");
          row.forEach(function(c){
            var td=document.createElement("td");
            td.textContent=c;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        holder.classList.remove("table-loading");
        holder.innerHTML="";
        holder.appendChild(table);
      })
      .catch(function(err){
        holder.classList.remove("table-loading");
        holder.innerHTML="<div class='note'>Tableau impossible à charger : "+err.message+"</div>";
      });
  });
});
</script><script>
(function(){
  var sidebar=document.getElementById("sidebar");
  if(!sidebar) return;
  var PREFIX="../../../";
  var CURRENT="traitements-des-cancers-infiltrants/formes-particulieres/formes-histologiques-rares/cancers-lobulaires-infiltrants.html";

  function isAncestorOfCurrent(node){
    if(node.href===CURRENT) return true;
    return (node.enfants||[]).some(isAncestorOfCurrent);
  }

  function renderNode(node, depth){
    var a=document.createElement("a");
    a.className="nav-node nav-level-"+Math.min(depth,4)+(node.href===CURRENT?" current":"");
    a.href=PREFIX+node.href;
    a.textContent=node.titre;
    if(node.enfants && node.enfants.length){
      var det=document.createElement("details");
      if(isAncestorOfCurrent(node)) det.open=true;
      var sum=document.createElement("summary");
      sum.appendChild(a);
      det.appendChild(sum);
      var ul=document.createElement("ul");
      ul.className="nav-children";
      node.enfants.forEach(function(c){
        var li=document.createElement("li");
        li.appendChild(renderNode(c, depth+1));
        ul.appendChild(li);
      });
      det.appendChild(ul);
      return det;
    }
    return a;
  }

  // L'arbre de navigation est partagé (nav-tree.json) et mis en cache par le
  // navigateur au lieu d'être réécrit dans chaque page.
  fetch(PREFIX+"nav-tree.json").then(function(r){return r.ok?r.json():[]}).then(function(NAV_TREE){
    var root=document.createElement("ul");
    root.className="nav-tree";
    (NAV_TREE||[]).forEach(function(ch){
      var li=document.createElement("li");
      li.appendChild(renderNode(ch, 0));
      root.appendChild(li);
    });
    sidebar.appendChild(root);

    var current=sidebar.querySelector(".nav-node.current");
    if(current) current.scrollIntoView({block:"center"});
  }).catch(function(){});

  var toggleBtn=document.getElementById("navToggleBtn");
  if(toggleBtn){
    toggleBtn.addEventListener("click",function(){ sidebar.classList.toggle("open"); });
    document.addEventListener("click",function(e){
      if(sidebar.classList.contains("open") && !sidebar.contains(e.target) && e.target!==toggleBtn){
        sidebar.classList.remove("open");
      }
    });
  }

  // Repli du menu sur ordinateur (choix mémorisé d'une page à l'autre)
  var edgeBtn=document.getElementById("sidebarEdgeBtn");
  if(edgeBtn){
    var STORAGE_KEY="senorif_sidebar_collapsed";
    function isDesktop(){ return window.matchMedia("(min-width:901px)").matches; }
    if(isDesktop() && localStorage.getItem(STORAGE_KEY)==="1"){
      sidebar.classList.add("sidebar-collapsed");
      edgeBtn.textContent="›";
    }
    edgeBtn.addEventListener("click",function(){
      sidebar.classList.toggle("sidebar-collapsed");
      var collapsed=sidebar.classList.contains("sidebar-collapsed");
      localStorage.setItem(STORAGE_KEY, collapsed?"1":"0");
      edgeBtn.textContent=collapsed?"›":"‹";
    });
  }
})();

(function(){
  var content=document.querySelector(".content");
  if(!content) return;

  var headings=Array.from(content.querySelectorAll("h2,h3"));
  if(headings.length>1){
    var toc=document.createElement("div");
    toc.className="toc";
    var title=document.createElement("div"); title.className="toc-title"; title.textContent="Sommaire de la page";
    toc.appendChild(title);

    headings.forEach(function(h,i){

      li.appendChild(a); ul.appendChild(li);
    });
    toc.appendChild(ul);
    content.insertBefore(toc, content.children[1]||null);
  }

  Array.from(content.querySelectorAll("table")).forEach(function(t){
    if(t.parentNode && t.parentNode.classList.contains("table-wrap")) return;
    var wrap=document.createElement("div");
    wrap.className="table-wrap";
    t.parentNode.insertBefore(wrap,t);
    wrap.appendChild(t);
  });

  var contentImgs=Array.from(content.querySelectorAll("img"));
  if(contentImgs.length){
    var overlay=document.getElementById("lightboxOverlay");
    if(!overlay){
      overlay=document.createElement("div");
      overlay.id="lightboxOverlay";
      overlay.setAttribute("role","dialog");
      overlay.setAttribute("aria-modal","true");
      overlay.setAttribute("aria-label","Image agrandie");
      var closeBtn=document.createElement("button");
      closeBtn.id="lightboxClose";
      closeBtn.type="button";
      closeBtn.setAttribute("aria-label","Fermer l'image agrandie");
      closeBtn.textContent="✕";
      overlay.appendChild(closeBtn);
      overlay.appendChild(document.createElement("img"));
      document.body.appendChild(overlay);
      function closeLightbox(){
        overlay.classList.remove("open");
        if(lastFocused && lastFocused.focus) lastFocused.focus();
      }
      var lastFocused=null;
      overlay.addEventListener("click",function(e){ if(e.target===overlay||e.target===closeBtn) closeLightbox(); });
      document.addEventListener("keydown",function(e){
        if(!overlay.classList.contains("open")) return;
        if(e.key==="Escape"){ closeLightbox(); return; }
        // Piège à focus : le bouton fermer est le seul élément focalisable
        // de la boîte de dialogue, donc Tab (dans un sens ou l'autre) doit
        // toujours y ramener le focus au lieu de sortir vers la page en dessous.
        if(e.key==="Tab"){ e.preventDefault(); closeBtn.focus(); }
      });
      overlay._open=function(src, sourceEl){
        lastFocused=sourceEl||null;
        overlay.querySelector("img").src=src;
        overlay.classList.add("open");
        closeBtn.focus();
      };
    }
    contentImgs.forEach(function(im){
      im.setAttribute("tabindex","0");
      im.setAttribute("role","button");
      if(!im.getAttribute("aria-label")) im.setAttribute("aria-label","Agrandir l'image");
      function open(){ overlay._open(im.src, im); }
      im.addEventListener("click",open);
      im.addEventListener("keydown",function(e){
        if(e.key==="Enter"||e.key===" "){ e.preventDefault(); open(); }
      });
    });
  }

  var params=new URLSearchParams(location.search);
  var q=(params.get("hl")||"").trim();
  if(q){
    var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
    var walker=document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null);
    var nodes=[], n;
    while(n=walker.nextNode()){
      re.lastIndex=0;
      if(re.test(n.nodeValue) && n.parentNode.tagName!=="SCRIPT") nodes.push(n);
    }
    nodes.forEach(function(node){
      re.lastIndex=0;
      var span=document.createElement("span");
      span.innerHTML=node.nodeValue.replace(re,"<mark>$1</mark>");
      node.parentNode.replaceChild(span,node);
    });
    var firstMark=content.querySelector("mark");
    if(firstMark) firstMark.scrollIntoView({behavior:"smooth",block:"center"});
  }
})();
