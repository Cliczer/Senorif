<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Page introuvable — SENORIF interactif</title><link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%233f6aa8'/%3E%3Ctext x='32' y='45' font-family='Arial,Helvetica,sans-serif' font-size='34' font-weight='900' fill='white' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E"><meta name="description" content="Cette page n&#039;existe pas ou plus sur SENORIF interactif."><style>:root {
  --bg:#ffffff;
  --card:#c5d8e8;
  --text:#233044;
  --muted:#617086;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrapper{max-width:1180px;margin:0 auto;padding:34px 22px 70px}
header{text-align:center;margin-bottom:30px}
.header-top{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:20px}
.header-title{flex:1 1 auto;min-width:260px}
.header-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
h1{color:#3f6aa8;font-size:clamp(34px,5vw,58px);font-weight:900}
.subtitle{color:#617086;font-size:17px;margin-top:8px}
.pdf-button{display:inline-flex;align-items:center;gap:8px;background:#3f6aa8;color:white;font-weight:800;font-size:14px;padding:12px 18px;border-radius:999px;text-decoration:none;white-space:nowrap;box-shadow:0 3px 10px rgba(31,50,90,.16)}
.pdf-button:hover{background:#335686}
.specialty-button{background:#48A68D}
.specialty-button:hover{background:#3a8873}
@media(max-width:640px){.header-top{flex-direction:column}}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}

.chapter summary{
  list-style:none;
  position:relative;
  width:100%;
  min-height:126px;
  border:0;
  border-radius:0 18px 18px 0;
  background:var(--card);
  color:#33456a;
  font-size:22px;
  font-weight:800;
  line-height:1.15;
  padding:18px 18px 34px 28px;
  cursor:pointer;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 3px 10px rgba(31,50,90,.06);
  overflow:hidden;
}
.chapter summary::-webkit-details-marker{display:none}
.chapter summary::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:24px;
  background:var(--accent);
}
.chapter[open] summary{
  background:color-mix(in srgb, var(--accent) 78%, white);
  color:white;
}
.chapter[open] summary::before{background:var(--accent)}

.summary-title{display:block}
.update-date{
  position:absolute;
  right:12px;
  bottom:9px;
  font-size:11px;
  font-weight:700;
  color:#4a5670;
  white-space:nowrap;
}
.chapter[open] .update-date{color:rgba(255,255,255,.82)}

.panel{
  background:color-mix(in srgb, var(--accent) 84%, #233044);
  color:white;
  border-radius:0 0 18px 18px;
  padding:28px 26px 32px;
  margin-top:10px;
  box-shadow:0 10px 24px rgba(31,50,90,.13);
}
.arrow{width:46px;height:34px;margin:0 0 18px 12px;position:relative}
.arrow::before,.arrow::after{content:"";position:absolute;width:34px;height:7px;background:#e5efff;border-radius:999px;top:14px}
.arrow::before{transform:rotate(-45deg);left:0}
.arrow::after{transform:rotate(45deg);left:21px}
.panel h2{font-size:26px;margin-bottom:18px;color:#eef5ff}
.panel ul{list-style:none}
.panel li{margin:8px 0}
.subchapter-btn{width:100%;border:0;background:transparent;color:#eef5ff;display:flex;gap:12px;align-items:flex-start;text-align:left;font-size:17px;font-weight:800;cursor:pointer;padding:4px 0;text-decoration:none}
.subchapter-btn:hover span:last-child{text-decoration:underline}
.chev{font-size:23px;line-height:1;color:#d9e8ff;font-weight:300}

@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.chapter summary{font-size:20px;min-height:112px}}
@media(max-width:560px){.grid{grid-template-columns:1fr}.chapter summary{min-height:92px}.panel h2{font-size:24px}.subchapter-btn{font-size:16px}}
.search-wrap{max-width:760px;margin:22px auto 28px;position:relative}
.search-box{width:100%;border:1px solid rgba(85,112,174,.28);border-radius:999px;padding:14px 18px;font-size:16px;color:var(--text);outline:none;box-shadow:0 3px 12px rgba(31,50,90,.06)}
.search-box:focus{border-color:#5570AE;box-shadow:0 0 0 4px rgba(85,112,174,.13)}
.search-filters{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.search-filter{border:1px solid rgba(85,112,174,.28);background:white;color:#3f6aa8;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer}
.search-filter:hover{background:#eef3fb}
.search-filter.active{background:#3f6aa8;color:white;border-color:#3f6aa8}
.search-results{display:none;position:absolute;z-index:20;left:0;right:0;top:96px;background:white;border:1px solid #e5e7eb;border-radius:16px;box-shadow:0 12px 30px rgba(31,50,90,.16);padding:10px;max-height:420px;overflow:auto;text-align:left}
.search-results.open{display:block}
.search-result{display:block;padding:12px 14px;border-radius:12px;color:var(--text);text-decoration:none}
.search-result:hover{background:#f3f6fb}
.search-result-title{font-weight:900;color:#3f6aa8;margin-bottom:4px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.result-badge{font-size:11px;font-weight:800;color:#5570AE;background:#eef1fa;border-radius:999px;padding:2px 9px}
.search-result-path{font-size:12px;font-weight:700;color:#617086;margin-bottom:5px}
.search-result-snippet{font-size:13px;color:#455066;line-height:1.4}
.search-result-snippet mark{background:#fff3a3;padding:0 2px;border-radius:3px}
